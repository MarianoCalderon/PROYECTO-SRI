<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubrir | Recomendador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="onboarding-modal" class="modal-overlay">
    <div class="modal-content" style="max-height: 85vh; overflow-y: auto;">
        <h2>Bienvenido a Descubrir</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Configura tu perfil para afinar el motor algorítmico.</p>
        
        <label style="display: block; font-weight: 600; margin-bottom: 8px;">ID de Usuario</label>
        <input type="text" id="nuevo-usuario-id" placeholder="Ej. usuario" autocomplete="off">

        <label style="display: block; font-weight: 600; margin-top: 20px;">Selecciona tus géneros</label>
        <div id="dynamic-genres" class="genre-grid">Cargando géneros...</div>

        <label style="display: block; font-weight: 600; margin-top: 20px;">Tus artistas favoritos</label>
        <div id="dynamic-artists" class="genre-grid" style="max-height: 150px; overflow-y: auto; border: 1px solid var(--border-color); padding: 10px; border-radius: 10px;">
            Cargando artistas...
        </div>

        <button onclick="enviarCuestionario()" style="margin-top: 30px;">Comenzar a escuchar</button>
    </div>
</div>

<div class="container">
    <h1 id="user-greeting">Descubrir</h1>
    <p class="subtitle">Selecciones algorítmicas basadas en tu actividad reciente.</p>
    <div id="loading">Analizando similitudes matemáticas...</div>
    <div id="recommendation-list"></div>
</div>

<script>
    const API_URL = 'http://127.0.0.1:8000';
    const uiWorker = new Worker('worker.js');
    let userId = null;

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    uiWorker.onmessage = function(e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('recommendation-list').innerHTML = e.data;
    };

    async function cargarOpcionesOnboarding() {
        try {
            const response = await fetch(`${API_URL}/onboarding-options/`);
            const data = await response.json();
            
            const genreHtml = data.genres.map(g => `<label><input type="checkbox" class="genre-cb" value="${escapeHtml(g)}"> ${escapeHtml(g)}</label>`).join('');
            document.getElementById('dynamic-genres').innerHTML = genreHtml || '<p>No hay géneros. Ejecuta seed_real_data.py.</p>';

            const artistHtml = data.artists.map(a => `<label><input type="checkbox" class="artist-cb" value="${escapeHtml(a)}"> ${escapeHtml(a)}</label>`).join('');
            document.getElementById('dynamic-artists').innerHTML = artistHtml || '<p>No hay artistas. Ejecuta seed_real_data.py.</p>';
        } catch (e) {
            console.error('Error cargando opciones', e);
            document.getElementById('dynamic-genres').innerHTML = '<p>No se pudo conectar con el backend.</p>';
            document.getElementById('dynamic-artists').innerHTML = '<p>No se pudo conectar con el backend.</p>';
        }
    }

    async function enviarCuestionario() {
        const inputId = document.getElementById('nuevo-usuario-id').value.trim();
        if (!inputId) { alert('Por favor ingresa un ID válido.'); return; }
        
        userId = inputId;
        const generosSeleccionados = Array.from(document.querySelectorAll('.genre-cb:checked')).map(cb => cb.value);
        const artistasSeleccionados = Array.from(document.querySelectorAll('.artist-cb:checked')).map(cb => cb.value);

        try {
            await fetch(`${API_URL}/register/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_id: userId, 
                    generos_favoritos: generosSeleccionados, 
                    artistas_favoritos: artistasSeleccionados, 
                    idioma_preferido: 'es' 
                })
            });

            document.getElementById('onboarding-modal').style.display = 'none';
            document.getElementById('user-greeting').innerText = `Recomendaciones para ${userId}`;
            cargarRecomendaciones(true, generosSeleccionados, artistasSeleccionados);
        } catch (e) {
            alert('Error al iniciar la sesión. Revisa que el servidor esté activo.');
        }
    }

    async function cargarRecomendaciones(isNew, genres = [], artists = []) {
        document.getElementById('loading').innerText = 'Buscando canciones que encajen contigo...';
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(`${API_URL}/recommendations/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_id: userId, 
                    is_new: isNew, 
                    initial_genres: genres,
                    initial_artists: artists
                })
            });
            const data = await response.json();
            uiWorker.postMessage(data);
        } catch (e) {
            document.getElementById('loading').innerText = 'Error en la red.';
        }
    }

    async function registrarInteraccion(trackId, rating = 5) {
        if (!userId) return;
        document.getElementById('loading').innerText = 'Recalculando tus recomendaciones...';
        document.getElementById('loading').style.display = 'block';
        try {
            await fetch(`${API_URL}/interact/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, track_id: trackId, rating })
            });
            cargarRecomendaciones(false);
        } catch (e) {
            console.error('Error al registrar interacción', e);
            document.getElementById('loading').innerText = 'No se pudo registrar la interacción.';
        }
    }

    cargarOpcionesOnboarding();
</script>
</body>
</html>
